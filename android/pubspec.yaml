name: byteaway
description: ByteAway Residential Proxy VPN & Node Sharing
publish_to: 'none'
version: 1.0.186+232

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Networking
  web_socket_channel: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Charts
  fl_chart: ^0.66.0

  # Connectivity
  cupertino_icons: ^1.0.5

  # Utils
  intl: ^0.19.0
  crypto: ^3.0.3
  package_info_plus: ^8.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  injectable_generator: ^2.4.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21 # match our project


flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png








































































































































































































































