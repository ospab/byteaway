services:
  master_node:
    build: 
      context: ./master_node
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # REST API & WebSocket
      - "1080:1080"   # SOCKS5 Gateway
    environment:
      - DATABASE_URL=postgres://byteaway:password@postgres:5432/proxy_master
      - REDIS_URL=redis://redis:6379/0
      - API_PORT=3000
      - SOCKS5_PORT=1080
      - PRICE_PER_GB_USD=5.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # Example Node Client (can be scaled)
  node_client_1:
    build:
      context: ./node_client
      dockerfile: Dockerfile
    environment:
      - MASTER_URL=ws://master_node:3000/ws
      - NODE_TOKEN=test_node_token
      - DEVICE_ID=node-1-uuid
      - COUNTRY=US
    depends_on:
      - master_node
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=byteaway
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=proxy_master
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byteaway -d proxy_master"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./master_node/migrations:/docker-entrypoint-initdb.d
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
