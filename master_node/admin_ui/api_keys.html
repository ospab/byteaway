<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteAway B2B - Управление API ключами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f14 0%, #1a1a24 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00d4aa, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #8e92a3;
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
        }

        .form-group input::placeholder {
            color: #8e92a3;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00d4aa, #00bcd4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .api-keys-list {
            margin-top: 40px;
        }

        .api-key-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .api-key-info h3 {
            color: #00d4aa;
            margin-bottom: 8px;
        }

        .api-key-info p {
            color: #8e92a3;
            margin-bottom: 4px;
        }

        .api-key-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8e92a3;
        }

        .api-key-actions {
            display: flex;
            gap: 10px;
        }

        .tier-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tier-starter {
            background: #4caf50;
            color: white;
        }

        .tier-business {
            background: #2196f3;
            color: white;
        }

        .tier-enterprise {
            background: #ff9800;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a24;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-header h2 {
            color: #00d4aa;
        }

        .close {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: #8e92a3;
        }

        .close:hover {
            color: #ffffff;
        }

        .api-key-display {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid #00d4aa;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }

        .warning {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            border-radius: 8px;
            padding: 12px;
            margin: 16px 0;
            color: #ff4757;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .api-key-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .api-key-actions {
                margin-top: 16px;
                width: 100%;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ByteAway B2B</h1>
            <p>Управление API ключами для residential прокси</p>
        </div>

        <!-- Форма создания нового API ключа -->
        <div class="card">
            <h2 style="margin-bottom: 24px;">Создать новый API ключ</h2>
            <form id="createApiKeyForm">
                <div class="form-group">
                    <label for="name">Название клиента/компании *</label>
                    <input type="text" id="name" name="name" required placeholder="ООО Ромашка">
                </div>

                <div class="form-group">
                    <label for="email">Email клиента</label>
                    <input type="email" id="email" name="email" placeholder="client@example.com">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tier">Тарифный план *</label>
                        <select id="tier" name="tier" required>
                            <option value="starter">Starter - $50/мес, 50GB</option>
                            <option value="business">Business - $200/мес, 250GB</option>
                            <option value="enterprise">Enterprise - $500/мес, 1TB</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="initial_balance">Начальный баланс ($)</label>
                        <input type="number" id="initial_balance" name="initial_balance" step="0.01" placeholder="50.00">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="traffic_limit">Лимит трафика (GB)</label>
                        <input type="number" id="traffic_limit" name="traffic_limit" step="0.1" placeholder="50">
                    </div>

                    <div class="form-group">
                        <label for="max_sessions">Макс. сессий</label>
                        <input type="number" id="max_sessions" name="max_sessions" placeholder="5">
                    </div>
                </div>

                <div class="form-group">
                    <label for="allowed_countries">Разрешенные страны (через запятую)</label>
                    <input type="text" id="allowed_countries" name="allowed_countries" placeholder="RU, US, DE, GB">
                </div>

                <div class="form-group">
                    <label for="expires_days">Срок действия (дней)</label>
                    <input type="number" id="expires_days" name="expires_days" placeholder="365">
                </div>

                <button type="submit" class="btn btn-primary">Создать API ключ</button>
            </form>
        </div>

        <!-- Список существующих API ключей -->
        <div class="api-keys-list">
            <h2 style="margin-bottom: 24px;">Существующие API ключи</h2>
            <div id="apiKeysList">
                <!-- Загружается через JavaScript -->
            </div>
        </div>
    </div>

    <!-- Модальное окно для отображения нового API ключа -->
    <div id="apiKeyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2>API ключ создан!</h2>
            </div>
            <div class="warning">
                ⚠️ Сохраните этот API ключ! Вы не сможете увидеть его снова.
            </div>
            <div class="api-key-display" id="newApiKey"></div>
            <button class="btn btn-primary" onclick="copyApiKey()">Копировать ключ</button>
            <button class="btn btn-secondary" onclick="closeModal()" style="margin-left: 10px;">Закрыть</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/v1/admin';
        const ADMIN_TOKEN = 'admin_token_here'; // TODO: Реальная аутентификация

        // Загрузка списка API ключей
        async function loadApiKeys() {
            try {
                const response = await fetch(`${API_BASE}/api-keys`, {
                    headers: {
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load API keys');
                
                const apiKeys = await response.json();
                displayApiKeys(apiKeys);
            } catch (error) {
                console.error('Error loading API keys:', error);
                document.getElementById('apiKeysList').innerHTML = 
                    '<div class="card"><p style="color: #ff4757;">Ошибка загрузки API ключей</p></div>';
            }
        }

        // Отображение списка API ключей
        function displayApiKeys(apiKeys) {
            const container = document.getElementById('apiKeysList');
            
            if (apiKeys.length === 0) {
                container.innerHTML = '<div class="card"><p style="color: #8e92a3;">Нет созданных API ключей</p></div>';
                return;
            }

            container.innerHTML = apiKeys.map(key => `
                <div class="api-key-item">
                    <div class="api-key-info">
                        <span class="tier-badge tier-${key.tier}">${key.tier.toUpperCase()}</span>
                        <h3>${key.name}</h3>
                        <p>📧 ${key.email || 'Не указан'}</p>
                        <p>🔑 Key ID: ${key.key_id}</p>
                        <p>📅 Создан: ${new Date(key.created_at).toLocaleDateString('ru-RU')}</p>
                        <p>🕐 Последнее использование: ${key.last_used_at ? new Date(key.last_used_at).toLocaleDateString('ru-RU') : 'Никогда'}</p>
                        
                        <div class="api-key-stats">
                            <div class="stat">
                                <div class="stat-value">$${key.balance_usd.toFixed(2)}</div>
                                <div class="stat-label">Баланс</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${key.traffic_used_gb.toFixed(1)}/${key.traffic_limit_gb.toFixed(1)} GB</div>
                                <div class="stat-label">Трафик</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${key.max_sessions === -1 ? '∞' : key.max_sessions}</div>
                                <div class="stat-label">Сессий</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="api-key-actions">
                        <button class="btn btn-secondary" onclick="addBalance('${key.key_id}')">Пополнить</button>
                        <button class="btn btn-secondary" onclick="toggleKey('${key.key_id}', ${!key.is_active})">
                            ${key.is_active ? 'Блокировать' : 'Активировать'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteKey('${key.key_id}')">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        // Создание нового API ключа
        document.getElementById('createApiKeyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                name: formData.get('name'),
                email: formData.get('email') || null,
                tier: formData.get('tier'),
                initial_balance_usd: parseFloat(formData.get('initial_balance')) || null,
                traffic_limit_gb: parseFloat(formData.get('traffic_limit')) || null,
                max_sessions: parseInt(formData.get('max_sessions')) || null,
                allowed_countries: formData.get('allowed_countries') ? 
                    formData.get('allowed_countries').split(',').map(c => c.trim()) : null,
                expires_days: parseInt(formData.get('expires_days')) || null
            };

            try {
                const response = await fetch(`${API_BASE}/api-keys`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Failed to create API key');

                const newKey = await response.json();
                showNewApiKey(newKey.api_key);
                e.target.reset();
                loadApiKeys();
            } catch (error) {
                console.error('Error creating API key:', error);
                alert('Ошибка создания API ключа');
            }
        });

        // Показать новый API ключ
        function showNewApiKey(apiKey) {
            document.getElementById('newApiKey').textContent = apiKey;
            document.getElementById('apiKeyModal').style.display = 'block';
        }

        // Закрыть модальное окно
        function closeModal() {
            document.getElementById('apiKeyModal').style.display = 'none';
        }

        // Копировать API ключ
        function copyApiKey() {
            const apiKey = document.getElementById('newApiKey').textContent;
            navigator.clipboard.writeText(apiKey).then(() => {
                alert('API ключ скопирован в буфер обмена');
            });
        }

        // Пополнить баланс
        async function addBalance(keyId) {
            const amount = prompt('Введите сумму для пополнения ($):');
            if (!amount) return;

            try {
                const response = await fetch(`${API_BASE}/api-keys/${keyId}/balance`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify({ amount_usd: parseFloat(amount) })
                });

                if (!response.ok) throw new Error('Failed to update balance');
                
                alert('Баланс успешно пополнен');
                loadApiKeys();
            } catch (error) {
                console.error('Error updating balance:', error);
                alert('Ошибка пополнения баланса');
            }
        }

        // Переключить статус API ключа
        async function toggleKey(keyId, isActive) {
            try {
                const response = await fetch(`${API_BASE}/api-keys/${keyId}/toggle`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    },
                    body: JSON.stringify(isActive)
                });

                if (!response.ok) throw new Error('Failed to toggle key');
                
                alert(`Ключ ${isActive ? 'активирован' : 'заблокирован'}`);
                loadApiKeys();
            } catch (error) {
                console.error('Error toggling key:', error);
                alert('Ошибка изменения статуса ключа');
            }
        }

        // Удалить API ключ
        async function deleteKey(keyId) {
            if (!confirm('Вы уверены, что хотите удалить этот API ключ?')) return;

            try {
                const response = await fetch(`${API_BASE}/api-keys/${keyId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${ADMIN_TOKEN}`
                    }
                });

                if (!response.ok) throw new Error('Failed to delete key');
                
                alert('API ключ удален');
                loadApiKeys();
            } catch (error) {
                console.error('Error deleting key:', error);
                alert('Ошибка удаления API ключа');
            }
        }

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('apiKeyModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Загрузка API ключей при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadApiKeys);
    </script>
</body>
</html>
