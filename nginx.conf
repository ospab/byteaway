server {
    listen 80;
    server_name byteaway.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name byteaway.xyz;

    server_tokens off;
    client_max_body_size 2m;

    ssl_certificate /etc/letsencrypt/live/byteaway.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byteaway.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://byteaway.xyz wss://byteaway.xyz https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # REST API -> master node
    location /api/ {
        proxy_pass http://127.0.0.1:35600;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket -> master node
    location /ws {
        proxy_pass http://127.0.0.1:35600;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend static files (Vite build)
    root /var/www/byteaway-web/dist;
    index index.html;

    # OTA artifacts must be served as static files only.
    # If file is missing, return 404 instead of SPA index.html.
    location = /downloads/byteaway-release.apk {
        return 403;
    }

    location ^~ /downloads/ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Internal-only file mapping for backend-approved APK downloads.
    location = /_protected_downloads/byteaway-release.apk {
        internal;
        try_files /downloads/byteaway-release.apk =404;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # Frontend source files must never be served in production.
    # If index.html points to /src/main.tsx, it means the wrong file was deployed.
    location ^~ /src/ {
        return 404;
    }

    # Root must always resolve to SPA entrypoint.
    location = / {
        try_files /index.html =404;
    }

    # Prevent internal redirect loops when index.html is missing.
    location = /index.html {
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html =404;
    }

    location ~ /\.
    {
        deny all;
    }
}
